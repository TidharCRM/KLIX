<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>KLIX — בחר חוויה</title>
    <meta
      name="description"
      content="בחר את הגרסה המתאימה ביותר עבורך להמשך הגלישה."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: "Heebo", -apple-system, Segoe UI, Arial, sans-serif;
        background:
          radial-gradient(900px 500px at 50% 10%, rgba(90, 70, 190, 0.35), transparent 60%),
          radial-gradient(700px 450px at 15% 85%, rgba(40, 25, 95, 0.5), transparent 65%),
          radial-gradient(600px 400px at 85% 70%, rgba(30, 20, 75, 0.5), transparent 65%),
          linear-gradient(180deg, #06081e 0%, #0e0d2f 50%, #07061c 100%);
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 54px 54px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 0%, transparent 78%);
        -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 0%, transparent 78%);
        opacity: 0.5;
        pointer-events: none;
      }

      .gate {
        position: relative;
        z-index: 1;
        width: min(560px, 92vw);
        padding: 0 20px;
        text-align: center;
        animation: rise 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) both;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .gate__brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        letter-spacing: 4px;
        font-size: 1rem;
        color: #fff;
        margin-bottom: 40px;
      }

      .gate__brand-mark {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #aef77c 0%, #2d7a30 100%);
        color: #05170a;
        border-radius: 10px;
        font-weight: 800;
        font-size: 1rem;
        box-shadow: 0 10px 26px rgba(119, 211, 77, 0.45);
      }

      .gate__kicker {
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.95rem;
        letter-spacing: 1px;
        margin-bottom: 14px;
        font-weight: 500;
      }

      .gate__title {
        font-size: clamp(2.2rem, 7vw, 3.8rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.03em;
        margin: 0 0 16px;
      }

      .gate__sub {
        color: rgba(255, 255, 255, 0.72);
        font-size: clamp(1rem, 1.5vw, 1.15rem);
        line-height: 1.6;
        max-width: 460px;
        margin: 0 auto 44px;
      }

      .gate__options {
        display: grid;
        gap: 14px;
        max-width: 380px;
        margin: 0 auto;
      }

      .gate__btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        padding: 22px 26px;
        border-radius: 16px;
        font-family: inherit;
        font-size: 1.15rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        text-decoration: none;
      }

      .gate__btn:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(174, 247, 124, 0.5);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
      }

      .gate__btn-label {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }

      .gate__btn-age {
        font-weight: 900;
        font-size: 1.2rem;
      }

      .gate__btn-hint {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 500;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 0.5px;
      }

      .gate__btn-arrow {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #aef77c 0%, #77d34d 100%);
        color: #0a1b0c;
        display: grid;
        place-items: center;
        font-weight: 900;
        flex-shrink: 0;
        transition: transform 0.2s ease;
      }

      .gate__btn:hover .gate__btn-arrow {
        transform: translateX(-4px);
      }

      .gate__foot {
        margin-top: 40px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.8rem;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <main class="gate" role="main">
      <div class="gate__brand">
        <span class="gate__brand-mark">K</span>
        <span>KLIX</span>
      </div>

      <p class="gate__kicker">רגע לפני שנתחיל</p>
      <h1 class="gate__title">בן כמה אתה?</h1>
      <p class="gate__sub">
        בחר את הגיל שלך ונתאים עבורך את החוויה המתאימה ביותר.
      </p>

      <div class="gate__options">
        <a href="./over30/" class="gate__btn" data-age="over">
          <span class="gate__btn-label">
            <span class="gate__btn-age">מעל 30</span>
            <span class="gate__btn-hint">30+ YEARS</span>
          </span>
          <span class="gate__btn-arrow" aria-hidden="true">←</span>
        </a>
        <a href="./under30/" class="gate__btn" data-age="under">
          <span class="gate__btn-label">
            <span class="gate__btn-age">מתחת ל־30</span>
            <span class="gate__btn-hint">UNDER 30</span>
          </span>
          <span class="gate__btn-arrow" aria-hidden="true">←</span>
        </a>
      </div>

      <p class="gate__foot">KLIX · AGE GATE · V1</p>
    </main>

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("klix_age");
          if (stored === "over") {
            location.replace("./over30/");
            return;
          }
          if (stored === "under") {
            location.replace("./under30/");
            return;
          }
        } catch (e) {}

        document.querySelectorAll("[data-age]").forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            try {
              localStorage.setItem("klix_age", btn.dataset.age);
            } catch (e) {}
          });
        });
      })();
    </script>
  </body>
</html>
