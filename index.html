<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>KLIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "FUP Galil";
        src: url("./over30/fonts/FUP Galil - ExtraBold.otf") format("opentype");
        font-weight: 800;
        font-display: swap;
      }
      @font-face {
        font-family: "FUP Galil";
        src: url("./over30/fonts/FUP Galil - Bold.otf") format("opentype");
        font-weight: 700;
        font-display: swap;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "FUP Galil", "Heebo", -apple-system, Segoe UI, Arial, sans-serif;
        background:
          radial-gradient(900px 500px at 50% 20%, rgba(90, 70, 190, 0.35), transparent 65%),
          linear-gradient(180deg, #06081e 0%, #0e0d2f 55%, #07061c 100%);
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .gate {
        width: min(560px, 100%);
        text-align: center;
      }

      .gate__logo {
        display: block;
        width: auto;
        max-width: min(200px, 70vw);
        height: auto;
        max-height: 52px;
        margin: 0 auto 28px;
        object-fit: contain;
      }

      .gate__q {
        font-size: clamp(2rem, 6vw, 3.2rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.03em;
        margin: 0 0 clamp(28px, 5vh, 44px);
      }

      .gate__opts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .gate__btn {
        display: block;
        padding: clamp(18px, 3vh, 24px);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        color: #fff;
        text-decoration: none;
        font-size: clamp(1.15rem, 2.4vw, 1.5rem);
        font-weight: 700;
        transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      }

      .gate__btn:hover,
      .gate__btn:focus-visible {
        background: rgba(174, 247, 124, 0.12);
        border-color: rgba(174, 247, 124, 0.5);
        transform: translateY(-2px);
        outline: none;
      }
    </style>
  </head>
  <body>
    <main class="gate">
      <img
        class="gate__logo"
        src="logo.png"
        alt="KLIX"
        width="200"
        height="60"
        loading="eager"
        decoding="async"
      />
      <h1 class="gate__q">מעל גיל 30?</h1>
      <div class="gate__opts">
        <a href="over30/index.html" class="gate__btn">כן</a>
        <a href="under30/index.html" class="gate__btn">לא</a>
      </div>
    </main>

    <script>
      try {
        localStorage.removeItem("klix_age");
        sessionStorage.removeItem("klix_age");
      } catch (e) {}
    </script>
  </body>
</html>
